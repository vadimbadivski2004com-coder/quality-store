<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality Store</title>
<style>
body {
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}
header {
  background:#111;
  color:white;
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
}
.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:30px;
}
.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  text-align:center;
}
.card h3 {
  margin-top:0;
}
button {
  background:black;
  color:white;
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
}
button:hover {
  background:#333;
}
.cart {
  position:fixed;
  top:20px;
  right:20px;
  background:white;
  padding:15px 20px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  font-weight:bold;
}
footer {
  text-align:center;
  padding:20px;
  background:#111;
  color:white;
  margin-top:40px;
}
</style>
</head>
<body>

<header>QUALITY STORE</header>

<div class="cart">
🛒 Кошик: <span id="cart-count">0</span>
</div>

<div class="products">
  <div class="card">
    <h3>Пароочисник</h3>
    <p>2499 ₴</p>
    <button onclick="addToCart()">Купити</button>
  </div>

  <div class="card">
    <h3>Блендер</h3>
    <p>1299 ₴</p>
    <button onclick="addToCart()">Купити</button>
  </div>

  <div class="card">
    <h3>Електрочайник</h3>
    <p>999 ₴</p>
    <button onclick="addToCart()">Купити</button>
  </div>
</div>

<footer>
© 2026 Quality Store. Всі права захищено.
</footer>

<script>
let count = 0;

function addToCart(){
  count++;
  document.getElementById("cart-count").innerText = count;
  alert("Товар додано в кошик!");
}
</script>

</body>
</html>
